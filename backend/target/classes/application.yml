server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: medi-home

  datasource:
    url: jdbc:mysql://localhost:3306/medi_home?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 5000ms

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.medihome.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: medi-home-secret-key-2024-do-not-share
  expiration: 604800000  # 7天，单位毫秒
  refresh-expiration: 2592000000  # 30天

# 文件上传配置
upload:
  path: ./uploads
  access-url: /uploads

# 日志配置
logging:
  level:
    com.medihome: debug
    org.springframework.security: debug
